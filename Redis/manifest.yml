apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  #DEPLOYMENT LABELS
  labels:
    project: roboshop
    tier: database
    component: redis
spec:
  replicas: 1
  #THESE ARE THE LABELS REPLICASET USES TO CREATE POD REPLICAS, THIS SHOULD MATCH POD TEMPLATE LABELS
  selector:
   matchLabels:
    project: roboshop
    tier: database
    component: redis
#THIS IS POD DEFINITION
  template:
    metadata:
     labels:
      project: roboshop
      tier: database
      component: redis
    spec:
      containers:
        - name: redis
          image: redis:7.0

    #kubectl get pods -n roboshop (to see pods created under roboshop namespace)

---

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
     project: roboshop
     tier: database
     component: redis
spec:
  selector: #HERE SELECTORS ARE LABELS (LABELS ARE SELECTORS,HERE THIS SERVICE WILL DEPEND ON LABLES TO SELECT AND WORK ON WHICH PODS)
     project: roboshop
     tier: database
     component: redis
  ports:
    - protocol: TCP
      port: 6379 # service port
      targetPort: 6379 # container port
