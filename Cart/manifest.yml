apiVersion: v1
kind: ConfigMap
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: app
    component: cart
data:
   REDIS_HOST: "redis"
   CATALOGUE_HOST: "catalogue"
   CATALOGUE_PORT: "8080"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: roboshop
  #DEPLOYMENT LABELS
  labels:
    project: roboshop
    tier: app
    component: cart
spec:
  replicas: 1
  # These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
      project: roboshop
      tier: app
      component: cart
  # This is pod definition
  template:
    metadata:
      labels:
        component: cart
        project: roboshop
        tier: app
    spec:
      containers:
      - name: cart
        image: venkattholeti/cart:v1
        envFrom:
        - configMapRef:
            name: cart

    #kubectl get pods -n roboshop (to see pods created under roboshop namespace)

---

apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: roboshop
  labels:
     project: roboshop
     tier: app
     component: cart
spec:
  selector: #HERE SELECTORS ARE LABELS (LABELS ARE SELECTORS,HERE THIS SERVICE WILL DEPEND ON LABLES TO SELECT AND WORK ON WHICH PODS)
     project: roboshop
     tier: app
     component: cart
  ports:
    - protocol: TCP
      port: 8080 # service port
      targetPort: 8080 # container port
